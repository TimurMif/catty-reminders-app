name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.PROXY_HOST }}
          username: ${{ vars.SERVER_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yaml,config.json"
          target: "/opt/catty-reminders"

      - name: Deploy via docker-compose
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.PROXY_HOST }}
          username: ${{ vars.SERVER_USER }}
          port: ${{ vars.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/catty-reminders
            
            # Приводим логин к нижнему регистру для Docker
            OWNER=$(echo "${{ github.repository_owner }}" | tr "[:upper:]" "[:lower:]")
            DEPLOY_SHA="${{ github.sha }}"
            IMAGE="ghcr.io/$OWNER/catty-reminders-app:$DEPLOY_SHA"
            
            # Создаем .env файл для Docker Compose
            printf "IMAGE=%s\n" "$IMAGE" > .env
            printf "DEPLOY_REF=%s\n" "$DEPLOY_SHA" >> .env
            printf "MYSQL_ROOT_PASSWORD=%s\n" "${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
            printf "MYSQL_DATABASE=%s\n" "${{ secrets.MYSQL_DATABASE }}" >> .env
            printf "MYSQL_USER=%s\n" "${{ secrets.MYSQL_USER }}" >> .env
            printf "MYSQL_PASSWORD=%s\n" "${{ secrets.MYSQL_PASSWORD }}" >> .env
            
            # Авторизация в GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Обновление и перезапуск
            docker pull "$IMAGE"
            docker ps -aq --filter "name=catty" | xargs -r docker rm -f
            docker compose up -d --force-recreate --remove-orphans
