name: CD - Deploy with Docker Compose

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ vars.PROXY_HOST }}
        username: ${{ vars.SERVER_USER }}
        port: ${{ vars.SSH_PORT }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /opt/catty-reminders
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          export DEPLOY_REF=${{ github.sha }}
          export APP_IMAGE=ghcr.io/timurmif/catty-reminders-app:${{ github.sha }}
          docker compose up -d --pull always --remove-orphans --force-recreate
